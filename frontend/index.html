<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>键盘监控仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e4e4e4;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.active {
            background: #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-value.small {
            font-size: 32px;
        }

        .card-value.warning {
            color: #ff6b6b;
        }

        .card-value.success {
            color: #00ff88;
        }

        .card-value.info {
            color: #00d9ff;
        }

        .mood-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
        }

        .mood-happy { background: linear-gradient(90deg, #00ff88, #00d9ff); }
        .mood-sad { background: linear-gradient(90deg, #667eea, #764ba2); }
        .mood-neutral { background: linear-gradient(90deg, #666, #888); }
        .mood-anxious { background: linear-gradient(90deg, #f093fb, #f5576c); }

        .chart-container {
            height: 200px;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
        }

        td {
            font-size: 14px;
        }

        .word-count {
            font-weight: 600;
            color: #00d9ff;
        }

        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .input-methods {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .ime-tag {
            padding: 4px 12px;
            background: rgba(0,217,255,0.2);
            border: 1px solid rgba(0,217,255,0.3);
            border-radius: 12px;
            font-size: 12px;
        }

        .refresh-info {
            font-size: 12px;
            color: #666;
            text-align: right;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* 心情变化时间线 */
        .mood-timeline {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 60px;
            padding: 10px 0;
        }

        .mood-bar {
            flex: 1;
            background: linear-gradient(to top, #00d9ff, #00ff88);
            border-radius: 4px 4px 0 0;
            min-height: 4px;
            transition: height 0.3s ease;
        }

        .mood-bar.low {
            background: linear-gradient(to top, #667eea, #764ba2);
        }

        .mood-bar.high {
            background: linear-gradient(to top, #f093fb, #f5576c);
        }

        /* 打字速度仪表 */
        .speed-gauge {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 20px auto;
        }

        .speed-circle {
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.5s ease;
        }

        .speed-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .speed-number {
            font-size: 42px;
            font-weight: 700;
            color: #00d9ff;
        }

        .speed-label {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⌨️ 键盘监控仪表盘</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
        </header>

        <div class="grid">
            <!-- 打字速度 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">打字速度</span>
                    <span class="refresh-info">实时更新</span>
                </div>
                <div class="speed-gauge">
                    <svg width="180" height="180" viewBox="0 0 180 180">
                        <circle cx="90" cy="90" r="70" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="12"/>
                        <circle class="speed-circle" id="speedCircle" cx="90" cy="90" r="70" fill="none"
                                stroke="url(#speedGradient)" stroke-width="12" stroke-linecap="round"
                                transform="rotate(-90 90 90)"/>
                        <defs>
                            <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#00d9ff"/>
                                <stop offset="100%" stop-color="#00ff88"/>
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="speed-value">
                        <div class="speed-number" id="wpmValue">0</div>
                        <div class="speed-label">WPM</div>
                    </div>
                </div>
                <div style="text-align:center">
                    <span style="color:#666;font-size:12px">CPM: </span>
                    <span id="cpmValue" style="color:#00ff88;font-weight:600">0</span>
                </div>
            </div>

            <!-- 心情状态 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">当前心情</span>
                    <span class="refresh-info" id="moodTime"></span>
                </div>
                <div style="text-align:center;padding:20px 0">
                    <span class="mood-badge mood-neutral" id="moodBadge">中性</span>
                </div>
                <div style="margin-top:20px">
                    <div style="display:flex;justify-content:space-between;color:#666;font-size:12px;margin-bottom:8px">
                        <span>情绪强度</span>
                        <span id="moodIntensity">50%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="moodProgress" style="width:50%"></div>
                    </div>
                </div>
                <div class="mood-timeline" id="moodTimeline">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 输入统计 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">输入统计</span>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
                    <div>
                        <div style="color:#666;font-size:12px">按键次数</div>
                        <div class="card-value small" id="keystrokesCount">0</div>
                    </div>
                    <div>
                        <div style="color:#666;font-size:12px">字符数</div>
                        <div class="card-value small info" id="charactersCount">0</div>
                    </div>
                </div>
                <div style="margin-top:20px">
                    <div style="color:#666;font-size:12px;margin-bottom:8px">当前输入法</div>
                    <div class="input-methods">
                        <span class="ime-tag" id="currentIME">ABC</span>
                    </div>
                </div>
            </div>

            <!-- 今日统计 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">今日数据</span>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
                    <div>
                        <div style="color:#666;font-size:11px">打字时长</div>
                        <div style="font-size:24px;font-weight:600" id="todayDuration">0分钟</div>
                    </div>
                    <div>
                        <div style="color:#666;font-size:11px">会话数</div>
                        <div style="font-size:24px;font-weight:600" id="todaySessions">0</div>
                    </div>
                    <div>
                        <div style="color:#666;font-size:11px">总字符</div>
                        <div style="font-size:24px;font-weight:600;color:#00d9ff" id="todayChars">0</div>
                    </div>
                    <div>
                        <div style="color:#666;font-size:11px">平均WPM</div>
                        <div style="font-size:24px;font-weight:600;color:#00ff88" id="todayAvgWpm">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid">
            <!-- 词频统计 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">高频汉字</span>
                    <select id="wordTypeFilter" style="background:rgba(255,255,255,0.1);border:none;color:#fff;padding:4px 8px;border-radius:4px">
                        <option value="chinese">中文</option>
                        <option value="english">英文</option>
                    </select>
                </div>
                <div id="wordFreqTable">
                    <table>
                        <thead>
                            <tr>
                                <th>排名</th>
                                <th>词/字</th>
                                <th>次数</th>
                            </tr>
                        </thead>
                        <tbody id="wordFreqBody">
                            <tr><td colspan="3" style="text-align:center;color:#666;padding:40px">暂无数据</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 打字速度历史 -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">速度历史</span>
                </div>
                <div class="chart-container">
                    <canvas id="speedChart" width="400" height="200"></canvas>
                </div>
            </div>

            <!-- 心情历史 -->
            <div class="card full-width">
                <div class="card-header">
                    <span class="card-title">心情变化曲线</span>
                    <select id="moodDaysFilter" style="background:rgba(255,255,255,0.1);border:none;color:#fff;padding:4px 8px;border-radius:4px">
                        <option value="1">最近1天</option>
                        <option value="7" selected>最近7天</option>
                        <option value="30">最近30天</option>
                    </select>
                </div>
                <div class="chart-container">
                    <canvas id="moodChart" width="1200" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 配置 ====================
        const API_BASE = 'http://127.0.0.1:65500';
        const WS_URL = 'ws://127.0.0.1:65500/ws';
        const REFRESH_INTERVAL = 1000;
        const MOOD_HISTORY_LIMIT = 50;

        // ==================== 状态 ====================
        let ws = null;
        let reconnectAttempts = 0;
        let moodHistory = [];

        // ==================== DOM元素 ====================
        const elements = {
            statusDot: document.getElementById('statusDot'),
            statusText: document.getElementById('statusText'),
            wpmValue: document.getElementById('wpmValue'),
            cpmValue: document.getElementById('cpmValue'),
            speedCircle: document.getElementById('speedCircle'),
            moodBadge: document.getElementById('moodBadge'),
            moodTime: document.getElementById('moodTime'),
            moodIntensity: document.getElementById('moodIntensity'),
            moodProgress: document.getElementById('moodProgress'),
            moodTimeline: document.getElementById('moodTimeline'),
            keystrokesCount: document.getElementById('keystrokesCount'),
            charactersCount: document.getElementById('charactersCount'),
            currentIME: document.getElementById('currentIME'),
            todayDuration: document.getElementById('todayDuration'),
            todaySessions: document.getElementById('todaySessions'),
            todayChars: document.getElementById('todayChars'),
            todayAvgWpm: document.getElementById('todayAvgWpm'),
            wordFreqBody: document.getElementById('wordFreqBody'),
            wordTypeFilter: document.getElementById('wordTypeFilter'),
            moodDaysFilter: document.getElementById('moodDaysFilter')
        };

        // ==================== WebSocket ====================
        function connectWS() {
            try {
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    console.log('WebSocket connected');
                    elements.statusDot.classList.add('active');
                    elements.statusText.textContent = '已连接';
                    reconnectAttempts = 0;
                };

                ws.onmessage = (event) => {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'keystroke') {
                        updateRealtimeStats(msg.data);
                    } else if (msg.type === 'init') {
                        updateRealtimeStats(msg.data);
                    }
                };

                ws.onclose = () => {
                    elements.statusDot.classList.remove('active');
                    elements.statusText.textContent = '断开连接';
                    reconnectAttempts++;
                    setTimeout(connectWS, Math.min(5000 * reconnectAttempts, 30000));
                };

                ws.onerror = (err) => {
                    console.error('WebSocket error:', err);
                    elements.statusText.textContent = '连接错误';
                };

            } catch (e) {
                console.error('Failed to connect WebSocket:', e);
                elements.statusText.textContent = '连接失败';
            }
        }

        // ==================== 数据更新 ====================
        function updateRealtimeStats(data) {
            if (!data) return;

            // WPM/CPM
            const wpm = data.wpm || 0;
            const cpm = data.cpm || 0;

            elements.wpmValue.textContent = Math.round(wpm);
            elements.cpmValue.textContent = Math.round(cpm);

            // 速度仪表盘 (最大200WPM)
            const maxWpm = 200;
            const offset = 440 - (Math.min(wpm, maxWpm) / maxWpm) * 440;
            elements.speedCircle.style.strokeDashoffset = offset;

            // 心情
            const mood = data.mood || 'neutral';
            const moodScore = data.mood_score || 0;
            updateMoodDisplay(mood, moodScore);

            // 统计
            elements.keystrokesCount.textContent = (data.keystrokes || 0).toLocaleString();
            elements.charactersCount.textContent = (data.characters || 0).toLocaleString();
            elements.currentIME.textContent = data.input_method || 'ABC';

            // 更新心情时间线
            addMoodHistory(mood, moodScore);
        }

        function updateMoodDisplay(mood, score) {
            const moodMap = {
                'happy': { text: '开心', class: 'mood-happy' },
                'sad': { text: '难过', class: 'mood-sad' },
                'neutral': { text: '中性', class: 'mood-neutral' },
                'anxious': { text: '焦虑', class: 'mood-anxious' }
            };

            const info = moodMap[mood] || moodMap.neutral;
            elements.moodBadge.textContent = info.text;
            elements.moodBadge.className = 'mood-badge ' + info.class;

            // 强度 (0-100%)
            const intensity = Math.abs(score) * 100;
            elements.moodIntensity.textContent = Math.round(intensity) + '%';
            elements.moodProgress.style.width = intensity + '%';

            elements.moodTime.textContent = new Date().toLocaleTimeString();
        }

        function addMoodHistory(mood, score) {
            moodHistory.push({ mood, score, time: Date.now() });
            if (moodHistory.length > MOOD_HISTORY_LIMIT) {
                moodHistory.shift();
            }
            renderMoodTimeline();
        }

        function renderMoodTimeline() {
            const container = elements.moodTimeline;
            container.innerHTML = '';

            const recent = moodHistory.slice(-20);
            recent.forEach(item => {
                const bar = document.createElement('div');
                bar.className = 'mood-bar';

                const height = (Math.abs(item.score) * 0.8 + 0.2) * 100;
                bar.style.height = height + '%';

                if (item.score < -0.3) {
                    bar.classList.add('low');
                } else if (item.score > 0.3) {
                    bar.classList.add('high');
                }

                container.appendChild(bar);
            });
        }

        // ==================== API请求 ====================
        async function fetchDailyStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats/daily`);
                const data = await res.json();

                if (data.total_typing_time !== undefined) {
                    const minutes = Math.round(data.total_typing_time / 60);
                    elements.todayDuration.textContent = minutes + '分钟';
                    elements.todaySessions.textContent = data.total_sessions || 0;
                    elements.todayChars.textContent = (data.total_characters || 0).toLocaleString();
                    elements.todayAvgWpm.textContent = Math.round(data.avg_typing_speed || 0);
                }
            } catch (e) {
                console.error('Failed to fetch daily stats:', e);
            }
        }

        async function fetchWordFrequency() {
            const wordType = elements.wordTypeFilter.value;
            try {
                const res = await fetch(`${API_BASE}/api/stats/word-frequency?limit=10&word_type=${wordType}`);
                const data = await res.json();

                if (Array.isArray(data) && data.length > 0) {
                    elements.wordFreqBody.innerHTML = data.map((item, i) => `
                        <tr>
                            <td>${i + 1}</td>
                            <td><strong>${item.word}</strong></td>
                            <td><span class="word-count">${item.count}</span></td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                console.error('Failed to fetch word frequency:', e);
            }
        }

        async function fetchMoodHistory() {
            const days = elements.moodDaysFilter.value;
            try {
                const res = await fetch(`${API_BASE}/api/stats/mood-history?days=${days}`);
                const data = await res.json();

                if (Array.isArray(data)) {
                    moodHistory = data.map(item => ({
                        mood: item.mood,
                        score: item.mood_score,
                        time: new Date(item.timestamp).getTime()
                    }));
                    renderMoodTimeline();
                    renderMoodChart(data);
                }
            } catch (e) {
                console.error('Failed to fetch mood history:', e);
            }
        }

        // ==================== 图表 ====================
        let moodChart = null;

        function renderMoodChart(data) {
            const canvas = document.getElementById('moodChart');
            const ctx = canvas.getContext('2d');

            if (moodChart) {
                moodChart.destroy();
            }

            const labels = data.map(d => new Date(d.timestamp).toLocaleDateString());
            const scores = data.map(d => d.mood_score);

            moodChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '心情指数',
                        data: scores,
                        borderColor: '#00d9ff',
                        backgroundColor: 'rgba(0, 217, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointBackgroundColor: '#00d9ff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            min: -1,
                            max: 1,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#666' }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#666' }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // ==================== 初始化 ====================
        function init() {
            // 连接WebSocket
            connectWS();

            // 定期刷新
            setInterval(fetchDailyStats, 5000);
            setInterval(fetchWordFrequency, 10000);

            // 初始加载
            fetchDailyStats();
            fetchWordFrequency();
            fetchMoodHistory();

            // 事件监听
            elements.wordTypeFilter.addEventListener('change', fetchWordFrequency);
            elements.moodDaysFilter.addEventListener('change', fetchMoodHistory);
        }

        // 启动
        init();
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</body>
</html>
